<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ================= META ================= -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details | GreenGrocery</title>

    <meta name="description"
        content="View fresh grocery product details, pricing, ratings and add products to your shopping cart.">

    <meta name="keywords"
        content="GreenGrocery, Product Details, Grocery Store, Fruits, Vegetables, HTML CSS JavaScript">

    <meta name="author"
        content="Aayan Kumar">

    <!-- Open Graph -->

    <meta property="og:title"
        content="GreenGrocery Product Details">

    <meta property="og:description"
        content="Browse grocery product information and related products.">

    <meta property="og:image"
        content="assets/images/hero.avif">

    <meta property="og:type"
        content="website">

    <!-- Theme Color -->

    <meta name="theme-color"
        content="#2E7D32">

    <!-- Favicon -->

    <link rel="icon"
        type="image/avif"
        href="assets/images/favicon.avif">

    <!-- CSS -->

    <link rel="stylesheet"
        href="styles.css">

</head>

<body>

    <!-- ================= LOADER ================= -->

    <div class="loader" aria-hidden="true">
        <span></span>
    </div>

    <!-- ================= HEADER ================= -->

    <header class="site-header">

        <nav class="navbar container"
            aria-label="Primary Navigation">

            <a class="logo"
                href="index.html">

                <span>Green</span>Grocery

            </a>

            <button
                class="menu-toggle"
                type="button"
                aria-label="Open Navigation"
                aria-expanded="false">

                ☰

            </button>

            <div
                class="nav-panel"
                id="nav-panel">

                <ul class="nav-links">

                    <li>
                        <a href="index.html">
                            Home
                        </a>
                    </li>

                    <li>
                        <a
                            href="products.html"
                            class="active">

                            Products

                        </a>
                    </li>

                    <li>
                        <a href="orders.html">
                            Orders
                        </a>
                    </li>

                    <li>
                        <a href="checkout.html">
                            Checkout
                        </a>
                    </li>

                </ul>

                <form
                    class="nav-search"
                    role="search"
                    action="products.html">

                    <label
                        class="sr-only"
                        for="site-search">

                        Search Products

                    </label>

                    <input
                        id="site-search"
                        name="q"
                        type="search"
                        placeholder="Search groceries">

                    <button type="submit">

                        Search

                    </button>

                </form>

            </div>

            <a
                class="cart-link"
                href="cart.html">

                Cart

                <span class="cart-count">

                    0

                </span>

            </a>

        </nav>

    </header>

    <!-- ================= MAIN ================= -->

    <main>

        <!-- Product Details -->

        <section
            class="section container detail-layout"
            data-product-detail>

        </section>

        <!-- Related Products -->

        <section class="section section-soft">

            <div class="container">

                <div class="section-heading split">

                    <div>

                        <p class="eyebrow">

                            You May Also Like

                        </p>

                        <h2>

                            Related Products

                        </h2>

                    </div>

                    <a
                        class="text-link"
                        href="products.html">

                        Back to Catalog

                    </a>

                </div>

                <div
                    class="product-grid related-grid"
                    data-related-products>

                </div>

            </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer class="site-footer">

        <div class="container footer-grid">

            <div>

                <a
                    class="logo footer-logo"
                    href="index.html">

                    <span>Green</span>Grocery

                </a>

                <p>

                    A modern grocery e-commerce website built
                    using HTML, CSS and JavaScript.

                </p>

            </div>

            <div>

                <h3>

                    Developer

                </h3>

                <p>

                    Aayan Kumar

                </p>

                <p>

                    Frontend Developer

                </p>

            </div>

            <div>

                <h3>

                    Connect

                </h3>

                <div class="social-links">

                    <a
                        href="https://github.com/AayZen"
                        target="_blank"
                        rel="noopener noreferrer">

                        GitHub

                    </a>

                    <a
                        href="https://linkedin.com/in/aayzen"
                        target="_blank"
                        rel="noopener noreferrer">

                        LinkedIn

                    </a>

                </div>

            </div>

        </div>

    </footer>

    <!-- ================= BACK TO TOP ================= -->

    <button
        class="back-to-top"
        type="button"
        aria-label="Back to Top">

        ↑

    </button>

    <!-- ================= SCRIPT ================= -->

    <script src="script.js"></script>

</body>

</html>
